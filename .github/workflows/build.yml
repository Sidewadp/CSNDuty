name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix Web Assets and Sync
        run: |
          # 1. 'www' folder nase tar banva
          mkdir -p www
          
          # 2. index.html shodha aani www madhe taka
          # Jar ti baher asel tar www madhe copy kara
          if [ -f "index.html" ]; then
            cp index.html www/
          fi
          
          # 3. Jar tumcha code dusrya folder madhe asel (e.g. public) tar to copy kara
          if [ -d "public" ]; then
            cp -r public/* www/
          fi
          
          # 4. Shevti check kara index.html aali ka, nase tar dummy banva (fail hou naye mhanun)
          if [ ! -f "www/index.html" ]; then
            echo "<html><body>CSNDuty App - File Not Found in Root</body></html>" > www/index.html
          fi

          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CSNDuty-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
